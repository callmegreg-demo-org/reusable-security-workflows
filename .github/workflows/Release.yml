name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Compute next version from conventional commits since the last tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          if git log "${LATEST_TAG}..HEAD" --pretty=%s | grep -qiE '^breaking[: ]|^feat!|^fix!'; then
            VERSION="$((MAJOR + 1)).0.0"
          elif git log "${LATEST_TAG}..HEAD" --pretty=%s | grep -qiE '^feat[:(]'; then
            VERSION="${MAJOR}.$((MINOR + 1)).0"
          else
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        run: |
          if ! echo "${{ steps.version.outputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in X.Y.Z format"
            exit 1
          fi

      - name: Create release tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --generate-notes \
            --title "v${VERSION}"
